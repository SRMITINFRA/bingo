<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Royale — Welcome</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6366f1">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --accent: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .word-tracker {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .letter-node {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--accent);
            position: relative;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
        }

        .letter-node::after {
            content: '';
            position: absolute;
            width: 120%;
            height: 3px;
            background: var(--accent);
            transform: rotate(-30deg);
        }

        button.btn-premium {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        button.btn-premium:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.5);
        }

        button.btn-install {
            background: transparent;
            border: 1px solid var(--border-glass);
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        button.btn-install:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        #flash-curtain {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #fff;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1 class="main-title">BINGO</h1>
        <div class="subtitle">Royale Edition</div>

        <div class="word-tracker">
            <div class="letter-node">B</div>
            <div class="letter-node">I</div>
            <div class="letter-node">N</div>
            <div class="letter-node">G</div>
            <div class="letter-node">O</div>
        </div>

        <button class="btn-premium" onclick="enterBattleArenaWithTransition()">
            Play Game
        </button>

        <button id="pwa-install-btn" class="btn-install hidden" onclick="triggerPWAInstallation()">
            📥 Install App
        </button>
    </div>

    <div id="flash-curtain"></div>

    <script>
        let deferredPrompt = null;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered:', reg.scope))
                    .catch(err => console.error('SW Registration Failed:', err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('pwa-install-btn');
            if (installBtn) installBtn.classList.remove('hidden');
        });

        function triggerPWAInstallation() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') {
                    document.getElementById('pwa-install-btn').classList.add('hidden');
                }
                deferredPrompt = null;
            });
        }

        // FIXED FUNCTION NAME MATCHING THE BUTTON'S CLICK EVENT
        function enterBattleArenaWithTransition() {
            const curtain = document.getElementById('flash-curtain');
            if(curtain) curtain.style.opacity = "1";

            setTimeout(() => {
                const searchParams = window.location.search;
                window.location.href = `./live.html${searchParams}`;
            }, 300);
        }
    </script>
</body>
</html>
