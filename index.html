<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime 1v1 BINGO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .setup-container, .game-container { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        .bingo-header { display: flex; justify-content: center; gap: 10px; margin: 15px 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }
        .bingo-letter { position: relative; color: #ccc; transition: color 0.3s ease; }
        .bingo-letter.struck { color: #e53e3e; }
        .bingo-letter.struck::after { content: "/"; position: absolute; left: 15%; top: -5px; color: #e53e3e; font-size: 3rem; transform: rotate(15deg); }

        .scoreboard { display: flex; justify-content: space-between; background: #edf2f7; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .status-banner { background: #3182ce; color: white; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; font-size: 1.1rem; }
        .status-banner.your-turn { background: #38a169; }
        .status-banner.waiting { background: #dd6b20; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #edf2f7; font-weight: bold; font-size: 1.3rem; cursor: pointer; border-radius: 6px; transition: all 0.2s ease; border: 2px solid transparent; user-select: none; }
        .cell:hover:not(.chosen) { background: #e2e8f0; }
        .cell.chosen { background: #e53e3e; color: white; cursor: not-allowed; }

        button { padding: 12px 24px; font-size: 1rem; margin: 8px; cursor: pointer; border-radius: 6px; border: none; background: #3182ce; color: white; font-weight: bold; transition: background 0.2s; }
        button:hover:not(:disabled) { background: #2b6cb0; }
        button:disabled { background: #cbd5e0; cursor: not-allowed; }
        input { padding: 12px; font-size: 1rem; width: 75%; border: 2px solid #e2e8f0; border-radius: 6px; text-align: center; margin-bottom: 10px; }
        input:focus { border-color: #3182ce; outline: none; }
    </style>
</head>
<body>

    <h1>🎉 Realtime 1v1 BINGO</h1>

    <div id="setup" class="setup-container">
        <h3>Enter Details to Play</h3>
        <input type="text" id="name-input" placeholder="Your Name" maxlength="15"><br>
        <input type="text" id="room-input" placeholder="Room Code (e.g., LUCH7)" maxlength="10">
        <br><br>
        <button onclick="joinGame()">Join / Create Game</button>
    </div>

    <div id="game" class="game-container hidden">
        <div class="scoreboard">
            <div><span id="p1-label">Player 1</span>: <span id="p1-score">0</span></div>
            <div><span id="p2-label">Player 2</span>: <span id="p2-score">0</span></div>
        </div>

        <div id="role-display" style="font-weight: bold; margin-bottom: 5px; color: #4a5568;">Assigning identity...</div>
        <div id="status-banner" class="status-banner waiting">Waiting for players...</div>

        <div class="bingo-header">
            <span class="bingo-letter" id="b-l-0">B</span>
            <span class="bingo-letter" id="b-l-1">I</span>
            <span class="bingo-letter" id="b-l-2">N</span>
            <span class="bingo-letter" id="b-l-3">G</span>
            <span class="bingo-letter" id="b-l-4">O</span>
        </div>

        <button id="start-btn" class="hidden" onclick="startGameRound()">Start Game</button>
        
        <div id="board" class="grid"></div>
        
        <div style="margin-top: 15px;">
            <button id="undo-btn" onclick="executeUndo()" disabled>Undo Move</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://euzjovtsereckmwvvunm.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1empvdnRzZXJlY2ttd3Z2dW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDYxODAsImV4cCI6MjA4OTAyMjE4MH0.dTRA6a8B-fPjjeaRlM6c8NwhbYWCJgCuF1c9Oz4RY7I";
        
        const supabaseApp = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentRoom = null;
        let myBoard = [];
        let myRole = null; 
        let playerName = "";
        let gameState = {};

        async function joinGame() {
            playerName = document.getElementById('name-input').value.trim();
            const roomCode = document.getElementById('room-input').value.trim().toUpperCase();

            if (!playerName) return alert("Please enter your name!");
            if (!roomCode) return alert("Please enter a room code!");

            // Save board layout configuration to prevent shifting items during browser reloads
            const storageKey = `bingo_board_${roomCode}`;
            const cachedBoard = localStorage.getItem(storageKey);
            if (cachedBoard) {
                myBoard = JSON.parse(cachedBoard);
            } else {
                myBoard = Array.from({length: 25}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
                localStorage.setItem(storageKey, JSON.stringify(myBoard));
            }

            try {
                let { data: game } = await supabaseApp.from('games').select('*').eq('room_code', roomCode).maybeSingle();

                if (!game) {
                    // Create new room layout structure if none exists
                    let { data: newGame } = await supabaseApp.from('games').insert([{ room_code: roomCode, player1_name: playerName }]).select().single();
                    game = newGame;
                    myRole = 'p1';
                } else {
                    // Match by name string values to allow reconnection logic safely
                    if (game.player1_name === playerName) {
                        myRole = 'p1';
                    } else if (game.player2_name === playerName) {
                        myRole = 'p2';
                    } else if (!game.player1_name) {
                        let { data: updatedGame } = await supabaseApp.from('games').update({ player1_name: playerName }).eq('room_code', roomCode).select().single();
                        game = updatedGame;
                        myRole = 'p1';
                    } else if (!game.player2_name) {
                        let { data: updatedGame } = await supabaseApp.from('games').update({ player2_name: playerName }).eq('room_code', roomCode).select().single();
                        game = updatedGame;
                        myRole = 'p2';
                    } else {
                        return alert("Room is full! Player 1 and Player 2 are already assigned.");
                    }
                }

                currentRoom = game.room_code;
                gameState = game;

                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                document.getElementById('role-display').innerText = `Logged in as: ${playerName} (${myRole.toUpperCase()})`;

                renderBoard();
                processStateUpdate();
                listenToRoom();
            } catch (err) {
                console.error(err);
            }
        }

        function listenToRoom() {
            // Listen to ALL events (wildcard '*') to capture edge connections correctly
            supabaseApp.channel('game-room')
                .on('postgres_changes', { event: '*', filter: `room_code=eq.${currentRoom}`, schema: 'public', table: 'games' }, 
                (payload) => {
                    gameState = payload.new;
                    processStateUpdate();
                })
                .subscribe();
        }

        function processStateUpdate() {
            document.getElementById('p1-score').innerText = gameState.p1_score || 0;
            document.getElementById('p2-score').innerText = gameState.p2_score || 0;
            document.getElementById('p1-label').innerText = gameState.player1_name || "Player 1";
            document.getElementById('p2-label').innerText = gameState.player2_name || "Player 2";

            const banner = document.getElementById('status-banner');
            const startBtn = document.getElementById('start-btn');
            const undoBtn = document.getElementById('undo-btn');

            if (!gameState.player1_name || !gameState.player2_name) {
                banner.innerText = "Waiting for Opponent to Connect...";
                banner.className = "status-banner waiting";
                startBtn.classList.add('hidden');
                return;
            }

            if (gameState.game_status === 'waiting') {
                banner.innerText = "Both players connected. Click 'Start Game' to begin!";
                banner.className = "status-banner waiting";
                startBtn.classList.remove('hidden'); // Visible to everyone
                undoBtn.disabled = true;
                return;
            }

            startBtn.classList.add('hidden');

            if (gameState.game_status.includes('_won') || gameState.game_status === 'draw') {
                if (gameState.game_status === 'draw') banner.innerText = "Round Ended: It's a Draw!";
                else {
                    const winnerName = gameState.game_status === 'p1_won' ? gameState.player1_name : gameState.player2_name;
                    banner.innerText = "🎉 " + winnerName + " WINS THIS ROUND! 🎉";
                }
                banner.className = "status-banner";
                undoBtn.disabled = true;
                startBtn.classList.remove('hidden');
                startBtn.innerText = "Play Next Round";
                refreshCellVisibilities();
                calculateCompletedLines();
                return;
            }

            // Game Loop: Player 1 has even turns (0, 2, 4...), Player 2 has odd turns (1, 3, 5...)
            let activePlayer = (gameState.history.length % 2 === 0) ? 'p1' : 'p2';
            if (myRole === activePlayer) {
                banner.innerText = "Your Turn! Select a number from your board.";
                banner.className = "status-banner your-turn";
            } else {
                const activeName = activePlayer === 'p1' ? gameState.player1_name : gameState.player2_name;
                banner.innerText = "Waiting for " + activeName + " to move...";
                banner.className = "status-banner waiting";
            }

            undoBtn.disabled = !(gameState.history.length > 0 && gameState.last_action_by === myRole && !gameState.undo_used_this_turn);

            refreshCellVisibilities();
            calculateCompletedLines();
        }

       async function startGameRound() {
            try {
                // Force reset all parameters securely with proper data type defaults
                const { error } = await supabaseApp.from('games').update({
                    game_status: 'playing',
                    history: [], // Ensure it explicitly sends an empty array structure
                    last_action_by: null,
                    undo_used_this_turn: false
                }).eq('room_code', currentRoom);

                if (error) {
                    console.error("Error starting game from Supabase:", error);
                    alert("Could not start game: " + error.message);
                }
            } catch (err) {
                console.error("Unexpected handler exception:", err);
            }
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            myBoard.forEach((num) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;
                cell.dataset.num = num;
                cell.addEventListener('click', () => selectCellNumber(num));
                boardDiv.appendChild(cell);
            });
        }

        function refreshCellVisibilities() {
            const history = gameState.history || [];
            document.querySelectorAll('.cell').forEach(cell => {
                let num = parseInt(cell.dataset.num);
                if (history.includes(num)) {
                    cell.classList.add('chosen'); // Red color indicator toggle
                } else {
                    cell.classList.remove('chosen');
                }
            });
        }

        async function selectCellNumber(num) {
            if (gameState.game_status !== 'playing') return;
            
            let activePlayer = (gameState.history.length % 2 === 0) ? 'p1' : 'p2';
            if (myRole !== activePlayer) return alert("It is not your turn!");
            if (gameState.history.includes(num)) return;

            let updatedHistory = [...gameState.history, num];
            let roundResults = evaluateBoardMetricsForUpdate(updatedHistory);

            await supabaseApp.from('games').update({
                history: updatedHistory,
                last_action_by: myRole,
                undo_used_this_turn: false,
                game_status: roundResults.status,
                p1_score: gameState.p1_score + roundResults.p1_add,
                p2_score: gameState.p2_score + roundResults.p2_add
            }).eq('room_code', currentRoom);
        }

        async function executeUndo() {
            if (gameState.game_status !== 'playing') return;
            if (gameState.last_action_by !== myRole || gameState.undo_used_this_turn) return alert("Undo unavailable.");

            let updatedHistory = [...gameState.history];
            updatedHistory.pop(); 

            await supabaseApp.from('games').update({
                history: updatedHistory,
                last_action_by: myRole,
                undo_used_this_turn: true
            }).eq('room_code', currentRoom);
        }

        function calculateCompletedLines() {
            const cells = Array.from(document.querySelectorAll('.cell'));
            const history = gameState.history || [];
            
            let currentBoardMatrix = [];
            for (let i = 0; i < 5; i++) {
                currentBoardMatrix.push(cells.slice(i * 5, (i + 1) * 5).map(c => history.includes(parseInt(c.dataset.num))));
            }

            let lines = 0;
            for (let r = 0; r < 5; r++) if (currentBoardMatrix[r].every(v => v)) lines++;
            for (let c = 0; c < 5; c++) if ([0,1,2,3,4].every(r => currentBoardMatrix[r][c])) lines++;
            if ([0,1,2,3,4].every(i => currentBoardMatrix[i][i])) lines++;
            if ([0,1,2,3,4].every(i => currentBoardMatrix[i][4 - i])) lines++;

            for (let i = 0; i < 5; i++) {
                const element = document.getElementById(`b-l-${i}`);
                if (lines > i) element.classList.add('struck');
                else element.classList.remove('struck');
            }
            return lines;
        }

        function evaluateBoardMetricsForUpdate(simulatedHistory) {
            const cells = Array.from(document.querySelectorAll('.cell'));
            let baselineNums = cells.map(c => parseInt(c.dataset.num));
            
            let linesCount = 0;
            let currentBoardMatrix = [];
            for (let i = 0; i < 5; i++) {
                currentBoardMatrix.push(baselineNums.slice(i * 5, (i + 1) * 5).map(n => simulatedHistory.includes(n)));
            }

            for (let r = 0; r < 5; r++) if (currentBoardMatrix[r].every(v => v)) linesCount++;
            for (let c = 0; c < 5; c++) if ([0,1,2,3,4].every(r => currentBoardMatrix[r][c])) linesCount++;
            if ([0,1,2,3,4].every(i => currentBoardMatrix[i][i])) linesCount++;
            if ([0,1,2,3,4].every(i => currentBoardMatrix[i][4 - i])) linesCount++;

            let returns = { status: 'playing', p1_add: 0, p2_add: 0 };

            if (linesCount >= 5) {
                if (myRole === 'p1') { returns.status = 'p1_won'; returns.p1_add = 1; }
                else { returns.status = 'p2_won'; returns.p2_add = 1; }
            } else if (simulatedHistory.length === 25) {
                returns.status = 'draw';
            }
            return returns;
        }
    </script>
</body>
</html>
