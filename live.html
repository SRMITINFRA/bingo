<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO Royale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --accent: #f43f5e;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1.main-title { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; letter-spacing: -1px; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-glass); border-radius: 24px; padding: 30px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        /* Layout Configurations focusing space completely on local arena elements */
        .game-layout { display: flex; gap: 30px; max-width: 500px; width: 100%; justify-content: center; position: relative; }
        .board-container { flex: 1; width: 100%; background: rgba(30, 41, 59, 0.4); padding: 20px; border-radius: 20px; border: 1px solid var(--border-glass); position: relative; }
        .board-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); text-align: center; }
        .board-title.active-user { color: var(--primary); }
        .hidden { display: none !important; }
        
        /* Minimal Top Action Row Utility Items */
        .top-status-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; margin-bottom: 12px; padding: 0 4px; }
        .live-status-indicator { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 0.85rem; color: var(--text-muted); }
        .indicator-dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; transition: all 0.3s; }
        .indicator-dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .btn-action-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: #fff; padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .btn-action-icon:hover { background: rgba(255,255,255,0.15); }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px 18px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-glass); border-radius: 12px; color: #fff; font-size: 1rem; }
        .radio-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .radio-tab { flex: 1; text-align: center; padding: 12px; background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-glass); border-radius: 12px; cursor: pointer; font-weight: 600; }
        .radio-tab.active { background: var(--primary); border-color: var(--primary); }
        button.btn-premium { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%); border: none; border-radius: 14px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        
        .scoreboard { display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.5); padding: 15px 20px; border-radius: 16px; margin-bottom: 15px; width: 100%; max-width: 500px; border: 1px solid var(--border-glass); }
        .score-box { text-align: center; }
        .score-box .name { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }
        .score-box .val { font-size: 1.8rem; font-weight: 800; }
        
        /* Compact Overlay Camera Frame Layers */
        .opponent-video-window { width: 100%; height: 120px; background: #0f172a; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border-glass); }
        .opponent-video-window video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .local-video-pip { position: fixed; bottom: 20px; right: 20px; width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--primary); overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 999; background: #0f172a; }
        .local-video-pip video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .status-banner { padding: 14px; border-radius: 12px; font-weight: 700; margin-bottom: 15px; text-align: center; width: 100%; max-width: 500px; }
        .status-banner.turn { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-banner.wait { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        
        .word-tracker { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }
        .letter-node { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-glass); border-radius: 8px; font-size: 1.2rem; font-weight: 900; color: #475569; position: relative; }
        .letter-node.struck { color: var(--accent); background: rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.4); }
        .letter-node.struck::after { content: ''; position: absolute; width: 120%; height: 2px; background: var(--accent); transform: rotate(-30deg); }
        
        .grid { display: grid; gap: 6px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: rgba(30, 41, 59, 0.5); border: 1px solid var(--border-glass); border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; user-select: none; transition: all 0.2s; }
        .cell:hover:not(.chosen) { background: var(--primary); color: white; }
        .cell.chosen { background: linear-gradient(135deg, var(--accent) 0%, #be123c 100%); color: white; cursor: not-allowed; border: none; }
        
        .footer-actions { display: flex; gap: 12px; margin-top: 15px; width: 100%; max-width: 500px; }
        .btn-secondary { background: rgba(64, 74, 89, 0.4); border: 1px solid var(--border-glass); color: #fff; flex: 1; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1 class="main-title">BINGO ROYALE</h1>

    <div id="setup-panel" class="glass-panel">
        <div class="form-group">
            <label>Opponent Type</label>
            <div class="radio-tabs">
                <div class="radio-tab active" id="tab-ai" onclick="setMode('ai')">VS Computer</div>
                <div class="radio-tab" id="tab-pvp" onclick="setMode('pvp')">Online PvP</div>
            </div>
        </div>
        <div class="form-group">
            <label>Your Profile Name</label>
            <input type="text" id="name-input" placeholder="Enter name..." maxlength="12">
        </div>
        <div class="form-group" id="room-group" style="display:none;">
            <label>Online Room Code</label>
            <input type="text" id="room-input" placeholder="e.g. LUCH73" maxlength="8">
        </div>
        <div class="form-group" id="ai-diff-group">
            <label>Computer Difficulty</label>
            <select id="ai-difficulty">
                <option value="easy">Easy (Random)</option>
                <option value="medium">Medium (Tactical)</option>
                <option value="hard">Hard (Aggressive)</option>
            </select>
        </div>
        <div class="form-group" id="grid-scale-group">
            <label>Grid Size</label>
            <select id="grid-size">
                <option value="4">4 x 4 Matrix (1-16)</option>
                <option value="5" selected>5 x 5 Matrix (1-25)</option>
                <option value="6">6 x 6 Matrix (1-36)</option>
                <option value="8">8 x 8 Matrix (1-64)</option>
                <option value="10">10 x 10 Matrix (1-100)</option>
            </select>
        </div>
        <button class="btn-premium" onclick="initiateGameEngine()">Enter Battle Arena</button>
    </div>

    <div id="arena-panel" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <div class="top-status-bar">
            <div class="live-status-indicator">
                <div class="indicator-dot" id="voice-dot"></div>
                <span id="voice-text">Connecting...</span>
            </div>
            <button id="invite-btn" class="btn-action-icon hidden" onclick="shareInviteLinkWhatsApp()">🔗 Share</button>
        </div>

        <div class="scoreboard">
            <div class="score-box">
                <div class="name" id="p1-title">Player 1</div>
                <div class="val" id="p1-score">0</div>
            </div>
            <div class="score-box">
                <div class="name" id="p2-title">Opponent</div>
                <div class="val" id="p2-score">0</div>
            </div>
        </div>

        <div id="status-banner" class="status-banner turn">Your Turn</div>
        <button id="start-btn" class="btn-premium hidden" style="max-width:500px; margin-bottom:15px;" onclick="startRoundLoop()">Start Round</button>

        <div class="game-layout">
            <div class="board-container">
                <div class="opponent-video-window" id="opponent-video-container" style="display:none;">
                    <video id="remote-video" autoplay playsinline></video>
                </div>
                <div class="board-title active-user" id="local-board-label">Your Board</div>
                <div class="word-tracker" id="word-container-p1"></div>
                <div id="board-p1" class="grid"></div>
            </div>
        </div>

        <div class="footer-actions">
            <button id="undo-btn" class="btn-secondary" onclick="triggerUndoAction()" disabled>Undo Last Move</button>
            <button class="btn-secondary" style="max-width: 60px;" title="Toggle Fullscreen" onclick="toggleFullscreenManual()">⛶</button>
            <button class="btn-secondary" style="background: rgba(244, 63, 94, 0.2); border-color: rgba(244, 63, 94, 0.4); color: var(--accent);" onclick="triggerExitRoomCleanup()">Exit Arena</button>
        </div>
    </div>

    <div class="local-video-pip hidden" id="local-video-container">
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <script>
        const SUPABASE_URL = "https://euzjovtsereckmwvvunm.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1empvdnRzZXJlY2ttd3Z2dW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDYxODAsImV4cCI6MjA4OTAyMjE4MH0.dTRA6a8B-fPjjeaRlM6c8NwhbYWCJgCuF1c9Oz4RY7I";
        const supabaseApp = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let gameMode = 'ai'; 
        let gridSize = 5;
        let totalCells = 25;
        let myBoard = [];
        let opponentBoard = []; 
        let currentRoom = null;
        let myRole = 'p1'; 
        let playerName = "";
        let gameState = { history: [], game_status: 'waiting', p1_score:0, p2_score:0 };
        let gameChannel = null;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                {
                    urls: 'turn:192.168.15.115:3478', 
                    username: 'srm_admin',
                    credential: 'supersecure123'
                }
            ]
        };
        let localStream = null;
        let peerConnection = null;

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rCode = urlParams.get('room');
            if(rCode) {
                setMode('pvp');
                document.getElementById('room-input').value = rCode;
            }
        });

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('tab-ai').classList.toggle('active', mode === 'ai');
            document.getElementById('tab-pvp').classList.toggle('active', mode === 'pvp');
            document.getElementById('room-group').style.display = mode === 'pvp' ? 'block' : 'none';
            document.getElementById('ai-diff-group').style.display = mode === 'ai' ? 'block' : 'none';
        }

        function shareInviteLinkWhatsApp() {
            if(!currentRoom) return;
            const inviteUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoom}`;
            const text = encodeURIComponent(`🎮 Play Video-Chat BINGO Royale with me! Click here: ${inviteUrl}`);
            window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
        }

        function toggleFullscreenManual() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        function triggerAutomaticGameFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            }
        }

        function buildWordHeaders(elementId) {
            const tracker = document.getElementById(elementId);
            if (!tracker) return;
            tracker.innerHTML = '';
            const targetWord = "BINGO".repeat(Math.ceil(gridSize/5)).substring(0, gridSize);
            for(let i=0; i<gridSize; i++) {
                tracker.innerHTML += `<div class="letter-node" id="${elementId}-l-${i}">${targetWord[i]}</div>`;
            }
        }

        function initiateGameEngine() {
            playerName = document.getElementById('name-input').value.trim() || "Player";
            if (gameMode === 'ai') {
                gridSize = parseInt(document.getElementById('grid-size').value);
                totalCells = gridSize * gridSize;
                launchSinglePlayerMode();
            } else {
                launchMultiplayerPvPMode();
            }
        }

        function launchSinglePlayerMode() {
            myBoard = Array.from({length: totalCells}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            opponentBoard = Array.from({length: totalCells}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            gameState = { history: [], game_status: 'playing', p1_score: 0, p2_score: 0, player1_name: playerName, player2_name: "CPU", grid_scale: gridSize };
            myRole = 'p1';
            
            document.getElementById('invite-btn').classList.add('hidden');
            document.getElementById('local-video-container').classList.add('hidden');
            document.getElementById('opponent-video-container').style.display = 'none';
            updateVoiceIndicator("Single Player Mode Active", true);
            
            setupUILayoutContainers();
            triggerAutomaticGameFullscreen();
        }

        async function launchMultiplayerPvPMode() {
            const roomCode = document.getElementById('room-input').value.trim().toUpperCase();
            if(!roomCode) return alert("Specify room connection code!");

            try {
                let { data: game, error: fetchError } = await supabaseApp.from('games').select('*').eq('room_code', roomCode).maybeSingle();
                if (fetchError) throw fetchError;

                if (!game) {
                    gridSize = parseInt(document.getElementById('grid-size').value);
                    totalCells = gridSize * gridSize;

                    let { data: nGame, error: insertError } = await supabaseApp.from('games').insert([{ 
                        room_code: roomCode, player1_name: playerName, history: [], grid_scale: gridSize, game_status: 'waiting'
                    }]).select().single();
                    if (insertError) throw insertError;
                    game = nGame; myRole = 'p1';
                } else {
                    gridSize = parseInt(game.grid_scale) || 5;
                    totalCells = gridSize * gridSize;
                    
                    if (game.player1_name === playerName) {
                        myRole = 'p1';
                    } else if (game.player2_name === playerName) {
                        myRole = 'p2';
                    } else if (!game.player2_name) {
                        let { data: uG, error: updateError } = await supabaseApp.from('games').update({ player2_name: playerName }).eq('room_code', roomCode).select().single();
                        if (updateError) throw updateError;
                        game = uG; myRole = 'p2';
                    } else { 
                        return alert("Room full!"); 
                    }
                }

                currentRoom = roomCode;
                gameState = game;

                const boardKey = `b_layout_${roomCode}_${myRole}`;
                if(localStorage.getItem(boardKey)) {
                    myBoard = JSON.parse(localStorage.getItem(boardKey));
                } else {
                    myBoard = Array.from({length: totalCells}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
                    localStorage.setItem(boardKey, JSON.stringify(myBoard));
                }

                document.getElementById('invite-btn').classList.remove('hidden');
                document.getElementById('opponent-video-container').style.display = 'block';
                document.getElementById('local-video-container').classList.remove('hidden');

                setupUILayoutContainers();
                connectRealtimeSyncStream();
                initializeVideoMediaHardware();
            } catch (x) { console.error(x); }
        }

        async function initializeVideoMediaHardware() {
            try {
                updateVoiceIndicator("Requesting Camera...", false);
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                
                const localVideo = document.getElementById('local-video');
                if(localVideo) localVideo.srcObject = localStream;
                
                updateVoiceIndicator("Live Video Ready", false);
                if (myRole === 'p2') {
                    setTimeout(initiateVoiceCallNegotiation, 1500);
                }
            } catch (err) {
                console.error(err);
                updateVoiceIndicator("Media Blocked", false);
            }
        }

        async function createPeerConnectionInstance() {
            if (peerConnection) return;
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    gameChannel.send({ type: 'broadcast', event: 'rtc-signal', payload: { candidate: event.candidate, sender: myRole } });
                }
            };

            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remote-video');
                if (remoteVideo) {
                    remoteVideo.srcObject = event.streams[0];
                    updateVoiceIndicator("Live Video Connected", true);
                }
            };
        }

        async function initiateVoiceCallNegotiation() {
            await createPeerConnectionInstance();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            gameChannel.send({ type: 'broadcast', event: 'rtc-signal', payload: { offer: offer, sender: myRole } });
        }

        async function routeIncomingRTCSignals(payload) {
            if (payload.sender === myRole) return;

            if (payload.offer) {
                await createPeerConnectionInstance();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                gameChannel.send({ type: 'broadcast', event: 'rtc-signal', payload: { answer: answer, sender: myRole } });
            } 
            else if (payload.answer) {
                if (peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.answer));
                }
            } 
            else if (payload.candidate) {
                if (peerConnection) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(payload.candidate));
                    } catch (e) { console.error(e); }
                }
            }
        }

        function updateVoiceIndicator(text, isActive) {
            document.getElementById('voice-text').innerText = text;
            document.getElementById('voice-dot').className = isActive ? "indicator-dot active" : "indicator-dot";
        }

        function setupUILayoutContainers() {
            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('arena-panel').classList.remove('hidden');
            document.getElementById('board-p1').style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            buildWordHeaders('word-container-p1');
            renderBoards();
            syncLocalArenaUI();
        }

        function connectRealtimeSyncStream() {
            gameChannel = supabaseApp.channel(`arena-${currentRoom}`, { config: { broadcast: { self: true } } });
            gameChannel
                .on('postgres_changes', { event: '*', filter: `room_code=eq.${currentRoom}`, schema: 'public', table: 'games' }, (p) => {
                    if (p.new) { gameState = p.new; syncLocalArenaUI(); }
                })
                .on('broadcast', { event: 'sync' }, (payload) => {
                    if (payload.payload && payload.payload.board && payload.payload.role !== myRole) {
                        opponentBoard = payload.payload.board;
                    }
                    remoteFetchState();
                })
                .on('broadcast', { event: 'rtc-signal' }, (payload) => {
                    routeIncomingRTCSignals(payload.payload);
                })
                .subscribe((s) => {
                    if(s === 'SUBSCRIBED') {
                        gameChannel.send({ type:'broadcast', event:'sync', payload:{ board: myBoard, role: myRole } });
                        remoteFetchState();
                    }
                });
        }

        async function remoteFetchState() {
            if (!currentRoom) return;
            let { data: game } = await supabaseApp.from('games').select('*').eq('room_code', currentRoom).maybeSingle();
            if(game) { gameState = game; syncLocalArenaUI(); }
        }

        function syncLocalArenaUI() {
            if (!gameState) return;

            document.getElementById('p1-title').innerText = gameState.player1_name || "Player 1";
            document.getElementById('p2-title').innerText = gameState.player2_name || "Opponent";
            document.getElementById('p1-score').innerText = gameState.p1_score || 0;
            document.getElementById('p2-score').innerText = gameState.p2_score || 0;

            document.getElementById('local-board-label').innerText = `${gameState.player1_name || "Player 1"}'s Arena`;

            const banner = document.getElementById('status-banner');
            const startBtn = document.getElementById('start-btn');
            const undoBtn = document.getElementById('undo-btn');

            if (gameMode === 'pvp' && (!gameState.player1_name || !gameState.player2_name)) {
                banner.innerText = "Awaiting entry from opponent...";
                banner.className = "status-banner wait";
                return;
            }

            if (gameState.game_status === 'waiting') {
                banner.innerText = "Arena connected. Click 'Start Round' to begin!";
                banner.className = "status-banner wait";
                startBtn.classList.remove('hidden');
                undoBtn.disabled = true;
                return;
            }

            startBtn.classList.add('hidden');

            if (gameState.game_status.includes('_won') || gameState.game_status === 'draw') {
                banner.innerText = gameState.game_status === 'draw' ? "Round ended in a draw!" : `Victory for ${gameState.game_status === 'p1_won' ? gameState.player1_name : gameState.player2_name}!`;
                banner.className = "status-banner";
                startBtn.classList.remove('hidden');
                undoBtn.disabled = true;
                refreshBoardVisualMarkings();
                calculateCrossedLines(myBoard, 'word-container-p1');

                if (currentRoom) {
                    localStorage.removeItem(`b_layout_${currentRoom}_p1`);
                    localStorage.removeItem(`b_layout_${currentRoom}_p2`);
                }
                return;
            }

            let historyList = gameState.history || [];
            let activeSide = (historyList.length % 2 === 0) ? 'p1' : 'p2';
            if (myRole === activeSide) {
                banner.innerText = "Your Turn! Pick a tile.";
                banner.className = "status-banner turn";
            } else {
                banner.innerText = `Awaiting move from ${activeSide === 'p1' ? gameState.player1_name : gameState.player2_name}...`;
                banner.className = "status-banner wait";
            }

            undoBtn.disabled = !(historyList.length > 0 && gameState.last_action_by === myRole && !gameState.undo_used_this_turn);
            
            refreshBoardVisualMarkings();
            calculateCrossedLines(myBoard, 'word-container-p1');

            if(gameMode === 'ai' && activeSide === 'p2' && gameState.game_status === 'playing') {
                setTimeout(executeComputerAIAction, 800);
            }
        }

        function renderBoards() {
            const boardP1 = document.getElementById('board-p1');
            boardP1.innerHTML = '';
            myBoard.forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;
                cell.dataset.num = num;
                cell.addEventListener('click', () => actionCellSelect(num));
                boardP1.appendChild(cell);
            });
        }

        function refreshBoardVisualMarkings() {
            const history = gameState ? (gameState.history || []) : [];
            document.querySelectorAll('.grid .cell').forEach(c => {
                c.classList.toggle('chosen', history.includes(parseInt(c.dataset.num)));
            });
        }

        async function actionCellSelect(num) {
            if (!gameState || gameState.game_status !== 'playing') return;
            let historyList = gameState.history || [];
            let activeSide = (historyList.length % 2 === 0) ? 'p1' : 'p2';
            if (myRole !== activeSide) return;
            if (historyList.includes(num)) return;

            processSelectionStep(num);
        }

        async function processSelectionStep(num) {
            let historyList = gameState.history || [];
            let updatedHistory = [...historyList, num];
            let evaluationResult = evaluateSimulatedMetrics(updatedHistory);

            if (gameMode === 'ai') {
                gameState.history = updatedHistory;
                gameState.game_status = evaluationResult.status;
                gameState.p1_score += evaluationResult.p1_add;
                gameState.p2_score += evaluationResult.p2_add;
                gameState.last_action_by = myRole;
                gameState.undo_used_this_turn = false;
                syncLocalArenaUI();
            } else {
                await supabaseApp.from('games').update({
                    history: updatedHistory, last_action_by: myRole, undo_used_this_turn: false,
                    game_status: evaluationResult.status,
                    p1_score: (gameState.p1_score || 0) + evaluationResult.p1_add,
                    p2_score: (gameState.p2_score || 0) + evaluationResult.p2_add
                }).eq('room_code', currentRoom);
                gameChannel.send({ type:'broadcast', event:'sync', payload:{ board: myBoard, role: myRole } });
            }
        }

        function executeComputerAIAction() {
            const history = gameState.history || [];
            let unchosen = Array.from({length: totalCells}, (_, i) => i + 1).filter(n => !history.includes(n));
            if(unchosen.length === 0) return;

            let diff = document.getElementById('ai-difficulty').value;
            let chosenNum = unchosen[0]; 

            if (diff === 'easy' || unchosen.length === 1) {
                chosenNum = unchosen[Math.floor(Math.random() * unchosen.length)];
            } else {
                let bestScore = -1;
                unchosen.forEach(num => {
                    let score = evaluateCellWeightMetrics(num, diff === 'hard');
                    if(score > bestScore) { bestScore = score; chosenNum = num; }
                });
            }

            myRole = 'p2'; 
            processSelectionStep(chosenNum);
            myRole = 'p1'; 
        }

        function evaluateCellWeightMetrics(num, checkOpponentLines) {
            let totalWeight = 0;
            let aiIndex = opponentBoard.indexOf(num);
            let aiRow = Math.floor(aiIndex / gridSize);
            let aiCol = aiIndex % gridSize;

            totalWeight += checkLineWeight(opponentBoard.filter((_, i) => Math.floor(i / gridSize) === aiRow));
            totalWeight += checkLineWeight(opponentBoard.filter((_, i) => (i % gridSize) === aiCol));
            if(aiRow === aiCol) totalWeight += checkLineWeight(opponentBoard.filter((_, i) => Math.floor(i / gridSize) === (i % gridSize)));
            if(aiRow + aiCol === gridSize - 1) totalWeight += checkLineWeight(opponentBoard.filter((_, i) => Math.floor(i / gridSize) + (i % gridSize) === gridSize - 1));

            if (checkOpponentLines) {
                let p1Index = myBoard.indexOf(num);
                let p1Row = Math.floor(p1Index / gridSize);
                let p1Col = p1Index % gridSize;

                let interceptWeight = 0;
                interceptWeight += checkLineWeight(myBoard.filter((_, i) => Math.floor(i / gridSize) === p1Row));
                interceptWeight += checkLineWeight(myBoard.filter((_, i) => (i % gridSize) === p1Col));
                if(p1Row === p1Col) interceptWeight += checkLineWeight(myBoard.filter((_, i) => Math.floor(i / gridSize) === (i % gridSize)));
                if(p1Row + p1Col === gridSize - 1) interceptWeight += checkLineWeight(myBoard.filter((_, i) => Math.floor(i / gridSize) + (i % gridSize) === gridSize - 1));

                totalWeight += interceptWeight * 1.3; 
            }
            return totalWeight;
        }

        function checkLineWeight(cellArray) {
            let history = gameState.history || [];
            let markedCount = cellArray.filter(n => history.includes(n)).length;
            if(markedCount === gridSize) return 0; 
            return Math.pow(markedCount + 1, 2);
        }

        async function triggerUndoAction() {
            if (!gameState || gameState.game_status !== 'playing' || gameState.last_action_by !== myRole || gameState.undo_used_this_turn) return;

            let updatedHistory = [...(gameState.history || [])];
            updatedHistory.pop();

            if (gameMode === 'ai') {
                gameState.history = updatedHistory;
                gameState.undo_used_this_turn = true;
                syncLocalArenaUI();
            } else {
                await supabaseApp.from('games').update({ history: updatedHistory, last_action_by: myRole, undo_used_this_turn: true }).eq('room_code', currentRoom);
                gameChannel.send({ type:'broadcast', event:'sync', payload:{ board: myBoard, role: myRole } });
            }
        }

        async function startRoundLoop() {
            myBoard = Array.from({length: totalCells}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            if(gameMode === 'ai') opponentBoard = Array.from({length: totalCells}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            
            if(gameMode === 'pvp') {
                localStorage.setItem(`b_layout_${currentRoom}_${myRole}`, JSON.stringify(myBoard));
            }

            renderBoards();
            triggerAutomaticGameFullscreen();

            if (gameMode === 'ai') {
                gameState.history = [];
                gameState.game_status = 'playing';
                gameState.last_action_by = null;
                gameState.undo_used_this_turn = false;
                syncLocalArenaUI();
            } else {
                await supabaseApp.from('games').update({ game_status: 'playing', history: [], last_action_by: null, undo_used_this_turn: false }).eq('room_code', currentRoom);
                gameChannel.send({ type:'broadcast', event:'sync', payload:{ board: myBoard, role: myRole } });
            }
        }

        function calculateCrossedLinesPureData(targetLayoutArray, history) {
            if (!targetLayoutArray || targetLayoutArray.length === 0) return 0;
            let currentBoardMatrix = [];
            for (let i = 0; i < gridSize; i++) {
                currentBoardMatrix.push(targetLayoutArray.slice(i * gridSize, (i + 1) * gridSize).map(n => history.includes(n)));
            }

            let lines = 0;
            for (let r = 0; r < gridSize; r++) if (currentBoardMatrix[r].every(v => v)) lines++;
            for (let c = 0; c < gridSize; c++) if ([...Array(gridSize).keys()].every(r => currentBoardMatrix[r][c])) lines++;
            if ([...Array(gridSize).keys()].every(i => currentBoardMatrix[i][i])) lines++;
            if ([...Array(gridSize).keys()].every(i => currentBoardMatrix[i][gridSize - 1 - i])) lines++;

            return lines;
        }

        function calculateCrossedLines(targetLayoutArray, trackerElementId) {
            const history = gameState ? (gameState.history || []) : [];
            let lines = calculateCrossedLinesPureData(targetLayoutArray, history);

            for (let i = 0; i < gridSize; i++) {
                const el = document.getElementById(`${trackerElementId}-l-${i}`);
                if(el) el.classList.toggle('struck', lines > i);
            }
            return lines;
        }

        function evaluateSimulatedMetrics(simulatedHistory) {
            let p1Lines = 0;
            let p2Lines = 0;

            if (gameMode === 'ai') {
                p1Lines = calculateCrossedLinesPureData(myBoard, simulatedHistory);
                p2Lines = calculateCrossedLinesPureData(opponentBoard, simulatedHistory);
            } else {
                if (myRole === 'p1') {
                    p1Lines = calculateCrossedLinesPureData(myBoard, simulatedHistory);
                    p2Lines = calculateCrossedLinesPureData(opponentBoard, simulatedHistory);
                } else {
                    p1Lines = calculateCrossedLinesPureData(opponentBoard, simulatedHistory);
                    p2Lines = calculateCrossedLinesPureData(myBoard, simulatedHistory);
                }
            }

            let result = { status: 'playing', p1_add: 0, p2_add: 0 };
            let p1Win = p1Lines >= gridSize;
            let p2Win = p2Lines >= gridSize;

            if (p1Win && p2Win) { result.status = 'draw'; }
            else if (p1Win) { result.status = 'p1_won'; result.p1_add = 1; }
            else if (p2Win) { result.status = 'p2_won'; result.p2_add = 1; }
            else if (simulatedHistory.length === totalCells) { result.status = 'draw'; }

            return result;
        }

        async function triggerExitRoomCleanup() {
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); }
            if (peerConnection) peerConnection.close();

            if (gameMode === 'pvp' && currentRoom) {
                try {
                    if (myRole === 'p1') {
                        await supabaseApp.from('games').update({ player1_name: null, game_status: 'waiting', history: [] }).eq('room_code', currentRoom);
                    } else {
                        await supabaseApp.from('games').update({ player2_name: null, game_status: 'waiting', history: [] }).eq('room_code', currentRoom);
                    }
                    localStorage.removeItem(`b_layout_${currentRoom}_p1`);
                    localStorage.removeItem(`b_layout_${currentRoom}_p2`);
                    if (gameChannel) gameChannel.send({ type:'broadcast', event:'sync', payload:{} });
                } catch(e) { console.error(e); }
            }
            if(document.fullscreenElement) { document.exitFullscreen().catch(()=>{}); }
            window.location.href = window.location.origin + window.location.pathname; 
        }
    </script>
